{% extends "base.html" %}

{% block title %}租客注册 - 房屋租赁管理系统{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box fade-in">
        <h2>📝 租客注册</h2>
        
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">姓名 *</label>
                    <input type="text" name="name" class="form-control" placeholder="真实姓名" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">手机号 *</label>
                    <input type="text" name="phone" class="form-control" placeholder="手机号" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">身份证号</label>
                <input type="text" name="id_card" class="form-control" placeholder="身份证号码">
            </div>
            
            <div class="mb-3">
                <label class="form-label">用户名 *</label>
                <input type="text" name="username" class="form-control" placeholder="设置登录用户名" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label">密码 *</label>
                <input type="password" name="password" class="form-control" placeholder="设置登录密码" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100 mb-3">注册</button>
        </form>
        
        <div class="text-center mt-3">
            <p>已有账号？ <a href="{{ url_for('tenant_login') }}">立即登录</a></p>
        </div>
        
        <div class="text-center mt-4">
            <hr>
            <p class="text-muted"><a href="{{ url_for('index') }}">← 返回首页</a></p>
        </div>
    </div>
</div>
{% endblock %}
