{% extends "base.html" %}
{% block title %}{% if song %}编辑歌曲{% else %}添加歌曲{% endif %} - 在线音乐管理系统{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <h4 class="mb-4">
                    <i class="fas {% if song %}fa-edit{% else %}fa-plus{% endif %} me-2" style="color: var(--primary-color);"></i>
                    {% if song %}编辑歌曲{% else %}添加歌曲{% endif %}
                </h4>
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">歌曲名称 *</label>
                            <input type="text" name="title" class="form-control" value="{{ song.title if song else '' }}" placeholder="输入歌曲名称" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">歌手</label>
                            <input type="text" name="artist" class="form-control" value="{{ song.artist if song else '' }}" placeholder="输入歌手名">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">专辑</label>
                            <input type="text" name="album" class="form-control" value="{{ song.album if song else '' }}" placeholder="输入专辑名称">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">流派</label>
                            <select name="genre" class="form-select">
                                {% for g in ['流行', '摇滚', '古典', '电子', '民谣', 'R&B', '爵士', '嘻哈'] %}
                                <option value="{{ g }}" {% if song and song.genre == g %}selected{% endif %}>{{ g }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">时长（秒）</label>
                            <input type="number" name="duration" class="form-control" value="{{ song.duration if song else 0 }}" min="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">音乐文件 *{% if song %}（留空则不更新）{% endif %}</label>
                            <input type="file" name="music_file" class="form-control" accept=".mp3,.wav,.flac" {% if not song %}required{% endif %}>
                            {% if song %}
                            <small style="color: var(--text-muted);">当前: {{ song.file_path }}</small>
                            {% endif %}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">封面图片</label>
                            <input type="file" name="cover_image" class="form-control" accept=".jpg,.jpeg,.png,.gif">
                        </div>
                        <div class="col-12">
                            <label class="form-label">歌词</label>
                            <textarea name="lyrics" class="form-control" rows="5" placeholder="输入歌词（可选）">{{ song.lyrics if song else '' }}</textarea>
                        </div>
                        <div class="col-12">
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i> {% if song %}保存修改{% else %}添加歌曲{% endif %}
                                </button>
                                <a href="{{ url_for('admin_songs') }}" class="btn btn-dark">取消</a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
