{% extends "base.html" %}
{% block title %}登录 - 在线音乐管理系统{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-music" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <h3 class="mt-3">欢迎回来</h3>
                    <p style="color: var(--text-secondary);">登录你的音乐账号</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3">
                        <i class="fas fa-sign-in-alt me-2"></i>登录
                    </button>
                </form>
                <div class="text-center mt-3">
                    <span style="color: var(--text-secondary);">还没有账号？</span>
                    <a href="{{ url_for('register') }}" class="text-decoration-none">立即注册</a>
                </div>
                <div class="text-center mt-2">
                    <small style="color: var(--text-muted);">演示账号: admin / admin123 或 demo / demo123</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
