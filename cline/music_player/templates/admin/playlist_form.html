{% extends "base.html" %}
{% block title %}{% if playlist %}编辑推荐歌单{% else %}创建推荐歌单{% endif %} - 在线音乐管理系统{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <h4 class="mb-4">
                    <i class="fas {% if playlist %}fa-edit{% else %}fa-plus{% endif %} me-2" style="color: var(--primary-color);"></i>
                    {% if playlist %}编辑推荐歌单{% else %}创建推荐歌单{% endif %}
                </h4>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">歌单名称 *</label>
                            <input type="text" name="name" class="form-control" value="{{ playlist.name if playlist else '' }}" placeholder="输入歌单名称" required>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <div class="form-check">
                                <input type="checkbox" name="is_official" class="form-check-input" id="isOfficial" {% if playlist and playlist.is_official %}checked{% endif %}>
                                <label class="form-check-label" for="isOfficial">标记为官方推荐</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">歌单描述</label>
                            <textarea name="description" class="form-control" rows="3" placeholder="描述你的歌单...">{{ playlist.description if playlist else '' }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">选择歌曲</label>
                            <div class="card" style="max-height: 300px; overflow-y: auto;">
                                <div class="card-body p-2">
                                    {% if songs %}
                                    <div class="row g-2">
                                        {% for song in songs %}
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input type="checkbox" name="song_ids" value="{{ song.id }}" class="form-check-input"
                                                       id="song{{ song.id }}"
                                                       {% if playlist_song_ids and song.id in playlist_song_ids %}checked{% endif %}>
                                                <label class="form-check-label" for="song{{ song.id }}" style="font-size: 0.85rem;">
                                                    {{ song.title }} - {{ song.artist }}
                                                    <span class="genre-badge" style="font-size: 0.65rem;">{{ song.genre }}</span>
                                                </label>
                                            </div>
                                        </div>
                                        {% endfor %}
                                    </div>
                                    {% else %}
                                    <p style="color: var(--text-secondary); text-align: center;">暂无可用歌曲</p>
                                    {% endif %}
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i> {% if playlist %}保存{% else %}创建{% endif %}
                                </button>
                                <a href="{{ url_for('admin_playlists') }}" class="btn btn-dark">取消</a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
