{% extends "base.html" %}

{% block title %}预约看房 - 房屋租赁管理系统{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-calendar-plus me-2"></i>预约看房</h5>
                </div>
                <div class="card-body">
                    <!-- 房源信息 -->
                    <div class="alert alert-info">
                        <h6>{{ house.title }}</h6>
                        <p class="mb-1"><i class="bi bi-geo-alt me-1"></i>{{ house.address }}</p>
                        <p class="mb-0"><strong class="text-danger">￥{{ house.price }}</strong>/月</p>
                    </div>

                    <form method="POST" action="{{ url_for('appointment_create', house_id=house.id) }}">
                        <div class="mb-3">
                            <label for="appointment_date" class="form-label">预约日期 *</label>
                            <input type="date" class="form-control" id="appointment_date" name="appointment_date" required
                                   min="{{ today }}">
                            <div class="form-text">请选择您方便的看房日期</div>
                        </div>

                        <div class="mb-3">
                            <label for="appointment_time" class="form-label">时间段 *</label>
                            <select class="form-select" id="appointment_time" name="appointment_time" required>
                                <option value="">请选择时间段</option>
                                <option value="09:00-10:00">09:00 - 10:00</option>
                                <option value="10:00-11:00">10:00 - 11:00</option>
                                <option value="11:00-12:00">11:00 - 12:00</option>
                                <option value="14:00-15:00">14:00 - 15:00</option>
                                <option value="15:00-16:00">15:00 - 16:00</option>
                                <option value="16:00-17:00">16:00 - 17:00</option>
                                <option value="17:00-18:00">17:00 - 18:00</option>
                            </select>
                            <div class="form-text">每个时间段仅限一组客户看房</div>
                        </div>

                        <div class="mb-3">
                            <label for="remark" class="form-label">备注</label>
                            <textarea class="form-control" id="remark" name="remark" rows="3"
                                      placeholder="如有特殊需求请在此说明"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">提交预约</button>
                            <a href="{{ url_for('house_detail', house_id=house.id) }}" class="btn btn-outline-secondary">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 设置日期选择器的最小值为今天
    document.getElementById('appointment_date').min = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
