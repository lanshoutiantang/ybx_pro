<!-- index.html - 五大行高股息实时监控（增强版 v2.0） -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五大行 · 高股息实时监控 v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f4fb; min-height: 100vh; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { max-width: 1440px; width: 100%; }

        /* 头部 */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 28px; background: white; padding: 18px 28px; border-radius: 28px; box-shadow: 0 8px 24px rgba(0,20,50,0.06); }
        .header h1 { font-size: 1.8rem; font-weight: 700; color: #0b1e3a; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: #d4a13e; }
        .header h1 .version { font-size: 0.7rem; background: #e8edf5; padding: 2px 10px; border-radius: 30px; color: #4a6a8a; font-weight: 500; margin-left: 6px; }
        .live-badge { background: #eef3fa; padding: 8px 20px; border-radius: 60px; font-size: 0.9rem; font-weight: 500; color: #1e3a6b; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .dot { display: inline-block; width: 10px; height: 10px; background: #2b9e4b; border-radius: 50%; animation: pulse-dot 1.8s infinite; }
        @keyframes pulse-dot { 0% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.4; transform: scale(0.9); } }
        .update-time { color: #42648d; font-size: 0.85rem; }
        .refresh-btn { background: #ebf2fa; border: none; color: #3b6a98; font-weight: 500; padding: 6px 16px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.15s; font-size: 0.85rem; }
        .refresh-btn:hover { background: #d5e2f2; }
        .refresh-btn:active i { transform: rotate(180deg); }

        /* 数据来源状态条 */
        .source-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; background: white; padding: 10px 20px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); align-items: center; }
        .source-bar .label { font-size: 0.75rem; color: #5f7d9e; font-weight: 600; }
        .source-tag { font-size: 0.7rem; padding: 3px 10px; border-radius: 30px; font-weight: 500; }
        .source-tag.realtime { background: #d4edda; color: #155724; }
        .source-tag.cache { background: #fff3cd; color: #856404; }
        .source-tag.fallback { background: #f8d7da; color: #721c24; }
        .calc-note { font-size: 0.7rem; color: #6c88aa; margin-left: auto; }

        /* 卡片网格 */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 28px; }
        .bank-card { background: white; border-radius: 24px; padding: 20px 18px 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,20,40,0.05); transition: 0.2s ease; }
        .bank-card:hover { transform: translateY(-3px); border-color: #b8cde0; box-shadow: 0 12px 32px rgba(0,30,60,0.08); }
        .bank-name { font-weight: 700; font-size: 1.25rem; color: #11243e; display: flex; justify-content: space-between; align-items: center; }
        .bank-name small { font-weight: 400; font-size: 0.7rem; background: #eaf0f8; padding: 2px 12px; border-radius: 40px; color: #2d4d78; }
        .divider-light { margin: 10px 0 10px; border: none; height: 1px; background: linear-gradient(to right, #e0e9f3, transparent); }
        .metric-row { display: flex; justify-content: space-between; padding: 5px 0; align-items: baseline; }
        .metric-label { color: #58749b; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .metric-value { font-weight: 700; font-size: 1.1rem; color: #0b1f3b; }
        .metric-value.dividend { color: #1b6b3b; }
        .metric-value.price { color: #1f3d62; }
        .change.positive { color: #1f8b4c; }
        .change.negative { color: #b33c3c; }
        .chip { background: #f0f5fe; padding: 2px 12px; border-radius: 30px; font-size: 0.68rem; font-weight: 500; color: #1a3f6a; }

        /* 图表面板 */
        .chart-panel { background: white; border-radius: 28px; padding: 24px 24px 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.02); margin-bottom: 28px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .chart-header h3 { font-weight: 600; color: #0e284a; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .chart-header h3 i { color: #ad8b4c; }
        .chart-tabs { display: flex; gap: 4px; background: #f0f5fc; padding: 3px; border-radius: 12px; }
        .chart-tab { padding: 5px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #4a6a8a; transition: 0.15s; }
        .chart-tab.active { background: white; color: #0b1e3a; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .chart-tab:hover:not(.active) { color: #0b1e3a; }
        .chart-container { height: 260px; width: 100%; position: relative; }

        /* 双栏布局 */
        .dual-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
        .panel { background: white; border-radius: 28px; padding: 20px 20px 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.02); }
        .panel h3 { font-weight: 600; color: #0e284a; font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .panel h3 i { color: #ad8b4c; }
        .panel .chart-container-sm { height: 200px; width: 100%; position: relative; }

        /* 表格 */
        .table-wrap { overflow-x: auto; margin-top: 20px; border-radius: 18px; border: 1px solid #eef3f9; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 580px; }
        th { text-align: left; padding: 14px 16px; background: #f8fafd; color: #1f3d62; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e2eaf3; }
        td { padding: 12px 16px; border-bottom: 1px solid #e9f0f7; color: #1a2f4a; }
        tr:last-child td { border-bottom: none; }
        .highlight-dividend { font-weight: 700; color: #146c3a; }
        .badge-rate { background: #e2f0e6; padding: 4px 14px; border-radius: 60px; font-size: 0.75rem; font-weight: 600; color: #13592e; display: inline-block; }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 0.7rem; font-weight: 700; }
        .rank-badge.gold { background: #fff3cd; color: #856404; }
        .rank-badge.silver { background: #e9ecef; color: #495057; }
        .rank-badge.bronze { background: #fde8d0; color: #8a5a2a; }
        .rank-badge.normal { background: #e8edf5; color: #4a6a8a; }

        .footer-note { margin-top: 14px; display: flex; justify-content: flex-end; color: #6c88aa; font-size: 0.75rem; gap: 20px; flex-wrap: wrap; }
        .status-banner { background: #e8f0fe; padding: 6px 18px; border-radius: 40px; font-size: 0.8rem; color: #1f4a7a; }
        .loading-shimmer { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #5f7d9e; }
        .loading-shimmer i { font-size: 2.5rem; color: #ad8b4c; }

        @media (max-width: 900px) { .dual-panel { grid-template-columns: 1fr; } }
        @media (max-width: 680px) { .header { flex-direction: column; align-items: flex-start; gap: 12px; } .live-badge { width: 100%; justify-content: flex-start; } .card-grid { grid-template-columns: 1fr 1fr; } .source-bar .calc-note { margin-left: 0; width: 100%; } }
        @media (max-width: 480px) { .card-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="dashboard" id="app">
        <!-- 头部 -->
        <header class="header">
            <h1>
                <i class="fas fa-chart-line"></i> 五大行 · 高股息监控
                <span class="version">v2.0</span>
            </h1>
            <div class="live-badge">
                <span class="dot"></span>
                <span id="liveStatus">实时数据 · 后端驱动</span>
                <span class="update-time" id="updateTimeDisplay">加载中...</span>
                <button class="refresh-btn" id="refreshDataBtn">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>
        </header>

        <!-- 数据来源状态 -->
        <div class="source-bar" id="sourceBar">
            <span class="label"><i class="fas fa-database"></i> 数据源:</span>
            <span class="source-tag realtime" id="sourceRealtime"><i class="fas fa-circle"></i> 实时</span>
            <span class="source-tag cache" id="sourceCache"><i class="fas fa-clock"></i> 缓存</span>
            <span class="source-tag fallback" id="sourceFallback"><i class="fas fa-exclamation-triangle"></i> 备用</span>
            <span class="calc-note"><i class="fas fa-calculator"></i> 股息率 = 每股分红(DPS) / 股价 × 100%</span>
        </div>

        <!-- 卡片区域 -->
        <div class="card-grid" id="bankCardsContainer">
            <div class="loading-shimmer">
                <i class="fas fa-spinner fa-spin"></i>
                <p style="margin-top:12px;">正在加载数据...</p>
            </div>
        </div>

        <!-- 主图表 + 表格 -->
        <div class="chart-panel">
            <div class="chart-header">
                <h3><i class="fas fa-chart-bar"></i> 股息率 & 股价</h3>
                <div class="chart-tabs">
                    <button class="chart-tab active" data-view="overview">概览</button>
                    <button class="chart-tab" data-view="trend">趋势</button>
                </div>
            </div>
            <div class="chart-container" id="mainChartContainer">
                <canvas id="mainChart"></canvas>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>银行</th>
                            <th>股价 (元)</th>
                            <th>股息率 %</th>
                            <th>每股股息 (元)</th>
                            <th>涨跌幅</th>
                            <th>高息评级</th>
                            <th>数据源</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" style="text-align:center; color:#7a96b8; padding:30px;">
                            <i class="fas fa-spinner fa-spin"></i> 加载中...
                        </td></tr>
                    </tbody>
                </table>
            </div>
            <div class="footer-note">
                <span><i class="fas fa-circle" style="color:#1f8b4c; font-size:0.5rem;"></i> 高股息标杆 >5%</span>
                <span><i class="fas fa-database"></i> 数据来自新浪/腾讯 · 60秒缓存</span>
                <span><i class="fas fa-clock"></i> 实时更新</span>
            </div>
        </div>

        <!-- 双栏：排名雷达图 + 历史趋势 -->
        <div class="dual-panel">
            <div class="panel">
                <h3><i class="fas fa-chart-pie"></i> 五大行指标排名</h3>
                <div class="chart-container-sm">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            <div class="panel">
                <h3><i class="fas fa-chart-line"></i> 股价趋势 (近30日)</h3>
                <div class="chart-container-sm">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 前端 JavaScript — 对接 Flask 后端 API (端口 5001)
        // ============================================================

        const API_BASE = 'http://127.0.0.1:5001';
        const API_DIVIDEND = API_BASE + '/api/dividend';
        const API_HISTORY = API_BASE + '/api/history';
        const API_RANK = API_BASE + '/api/rank';

        let chartMain = null;
        let chartRadar = null;
        let chartTrend = null;
        let currentData = [];
        let currentHistory = [];
        let currentRank = [];
        let currentView = 'overview';

        // DOM 引用
        const cardsContainer = document.getElementById('bankCardsContainer');
        const tableBody = document.getElementById('tableBody');
        const updateTimeDisplay = document.getElementById('updateTimeDisplay');
        const refreshBtn = document.getElementById('refreshDataBtn');
        const liveStatus = document.getElementById('liveStatus');
        const sourceRealtime = document.getElementById('sourceRealtime');
        const sourceCache = document.getElementById('sourceCache');
        const sourceFallback = document.getElementById('sourceFallback');

        // ---------- 格式化 ----------
        function formatPrice(val) { return val !== undefined && val !== null ? val.toFixed(2) : '--'; }
        function formatDividend(val) { return val !== undefined && val !== null ? val.toFixed(2) + '%' : '--%'; }

        // ---------- 更新数据源状态 ----------
        function updateSourceStatus(data) {
            sourceRealtime.style.display = 'none';
            sourceCache.style.display = 'none';
            sourceFallback.style.display = 'none';

            if (!data || data.length === 0) return;

            let hasRealtime = false, hasCache = false, hasFallback = false;
            data.forEach(d => {
                const src = (d.data_source || '').toLowerCase();
                if (src.includes('实时') || src.includes('realtime')) hasRealtime = true;
                else if (src.includes('缓存') || src.includes('cache')) hasCache = true;
                else hasFallback = true;
            });

            if (hasRealtime) sourceRealtime.style.display = 'inline-block';
            if (hasCache) sourceCache.style.display = 'inline-block';
            if (hasFallback) sourceFallback.style.display = 'inline-block';
        }

        // ---------- 渲染卡片 ----------
        function renderCards(data) {
            if (!data || data.length === 0) {
                cardsContainer.innerHTML =
                    `<div class="loading-shimmer" style="color:#b33c3c;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p style="margin-top:12px;">暂无数据，请检查后端服务</p>
                    </div>`;
                return;
            }
            let html = '';
            data.forEach((item) => {
                const changeClass = item.change >= 0 ? 'positive' : 'negative';
                const changeSign = item.change >= 0 ? '+' : '';
                const isHighYield = item.dividend >= 5.5;
                const srcColor = (item.data_source || '').includes('备用') ? '#b33c3c' : '#2b9e4b';
                html += `
                    <div class="bank-card">
                        <div class="bank-name">
                            ${item.name}
                            <small><i class="fas fa-coins"></i> ${item.code || '--'}</small>
                        </div>
                        <hr class="divider-light">
                        <div class="metric-row">
                            <span class="metric-label"><i class="fas fa-percentage"></i> 股息率</span>
                            <span class="metric-value dividend">${formatDividend(item.dividend)}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label"><i class="fas fa-dollar-sign"></i> 股价</span>
                            <span class="metric-value price">${formatPrice(item.price)}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label"><i class="fas fa-arrow-up"></i> 涨跌幅</span>
                            <span class="metric-value change ${changeClass}">${changeSign}${item.change?.toFixed(2) || '0.00'}%</span>
                        </div>
                        <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
                            <span class="chip"><i class="fas fa-hand-holding-usd"></i> 每股 ${item.dps?.toFixed(4) || '--'}</span>
                            ${isHighYield ? '<span class="chip" style="background:#d4edda; color:#13592e;"><i class="fas fa-star" style="color:#d4a13e;"></i> 高息</span>' : ''}
                            <span class="chip" style="background:#e7eef8;"><i class="fas fa-circle" style="color:${srcColor}; font-size:0.5rem;"></i> ${item.data_source || '实时'}</span>
                        </div>
                    </div>
                `;
            });
            cardsContainer.innerHTML = html;
        }

        // ---------- 渲染表格 ----------
        function renderTable(data) {
            if (!data || data.length === 0) {
                tableBody.innerHTML =
                    `<tr><td colspan="7" style="text-align:center; color:#b33c3c; padding:30px;">❌ 数据加载失败</td></tr>`;
                return;
            }
            let html = '';
            data.forEach((item) => {
                const changeClass = item.change >= 0 ? 'positive' : 'negative';
                const changeSign = item.change >= 0 ? '+' : '';
                const isHighYield = item.dividend >= 5.5;
                const srcColor = (item.data_source || '').includes('备用') ? '#b33c3c' : '#2b9e4b';
                html += `
                    <tr>
                        <td><strong>${item.name}</strong></td>
                        <td>${formatPrice(item.price)}</td>
                        <td><span class="highlight-dividend">${formatDividend(item.dividend)}</span></td>
                        <td>${item.dps?.toFixed(4) || '--'}</td>
                        <td class="${changeClass}">${changeSign}${item.change?.toFixed(2) || '0.00'}%</td>
                        <td>${isHighYield ? '<span class="badge-rate"><i class="fas fa-star" style="color:#d4a13e;"></i> 高息</span>' : '<span style="color:#7a96b8; font-size:0.8rem;">—</span>'}</td>
                        <td><span style="color:${srcColor}; font-size:0.8rem;"><i class="fas fa-circle" style="font-size:0.5rem;"></i> ${item.data_source || '实时'}</span></td>
                    </tr>
                `;
            });
            tableBody.innerHTML = html;
        }

        // ---------- 主图表（概览/趋势切换） ----------
        function updateMainChart(data, view) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chartMain) { chartMain.destroy(); chartMain = null; }

            if (view === 'overview') {
                // 概览：股息率柱状图 + 股价折线
                const labels = data.map(d => d.name);
                const dividendValues = data.map(d => d.dividend || 0);
                const priceValues = data.map(d => d.price || 0);
                const colors = ['#2d6f4a', '#3a7d5a', '#478d68', '#569a78', '#68a888'];

                chartMain = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '股息率 %',
                            data: dividendValues,
                            backgroundColor: colors.map(c => c + 'DD'),
                            borderColor: colors,
                            borderWidth: 2,
                            borderRadius: 6,
                            yAxisID: 'y',
                            barPercentage: 0.55,
                        }, {
                            label: '股价 (元)',
                            data: priceValues,
                            type: 'line',
                            borderColor: '#2a5f8a',
                            backgroundColor: 'rgba(42, 95, 138, 0.06)',
                            borderWidth: 3,
                            pointBackgroundColor: '#1d4670',
                            pointBorderColor: 'white',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            fill: true,
                            tension: 0.15,
                            yAxisID: 'y1',
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { labels: { boxWidth: 14, font: { size: 12, weight: '600' }, color: '#294a70', padding: 16 }, position: 'top' },
                            tooltip: {
                                backgroundColor: 'rgba(255,255,255,0.95)', titleColor: '#0b1e3a', bodyColor: '#1a2f4a',
                                borderColor: '#d0dcec', borderWidth: 1, cornerRadius: 12, padding: 12,
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        let val = context.parsed.y;
                                        if (context.dataset.label.includes('股息率')) return label + ': ' + val.toFixed(2) + '%';
                                        return label + ': ¥' + val.toFixed(2);
                                    }
                                }
                            }
                        },
                        scales: {
                            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { callback: (v) => v + '%', font: { size: 11 } }, position: 'left', title: { display: true, text: '股息率 %', color: '#316745', font: { size: 11, weight: '600' } } },
                            y1: { beginAtZero: true, grid: { drawOnChartArea: false }, position: 'right', ticks: { font: { size: 11 } }, title: { display: true, text: '股价 (元)', color: '#2a5f8a', font: { size: 11, weight: '600' } } },
                            x: { grid: { display: false }, ticks: { font: { size: 11, weight: '500' } } }
                        }
                    }
                });
            } else if (view === 'trend' && currentHistory.length > 0) {
                // 趋势：多线股价走势
                const datasets = currentHistory.map((bank, idx) => {
                    const colors = ['#2d6f4a', '#3a7d5a', '#478d68', '#569a78', '#68a888'];
                    return {
                        label: bank.name,
                        data: bank.prices,
                        borderColor: colors[idx % colors.length],
                        backgroundColor: colors[idx % colors.length] + '22',
                        borderWidth: 2,
                        pointRadius: 2,
                        pointHoverRadius: 5,
                        fill: false,
                        tension: 0.2,
                    };
                });

                chartMain = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: currentHistory[0]?.dates || [],
                        datasets: datasets
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { labels: { boxWidth: 12, font: { size: 11, weight: '500' }, color: '#294a70' }, position: 'top' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.dataset.label + ': ¥' + context.parsed.y.toFixed(2);
                                    }
                                }
                            }
                        },
                        scales: {
                            y: { beginAtZero: false, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 } }, title: { display: true, text: '股价 (元)', color: '#2a5f8a', font: { size: 11, weight: '600' } } },
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 10 } }
                        }
                    }
                });
            }
        }

        // ---------- 雷达图（排名） ----------
        function updateRadarChart(rankData) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (chartRadar) { chartRadar.destroy(); chartRadar = null; }

            if (!rankData || rankData.length === 0) return;

            // 归一化排名：排名越靠前（数字越小）得分越高
            const maxRank = rankData.length;
            const labels = rankData.map(d => d.name);
            const dividendScores = rankData.map(d => (maxRank - d.dividend_rank + 1) / maxRank * 100);
            const priceScores = rankData.map(d => (maxRank - d.price_rank + 1) / maxRank * 100);
            const changeScores = rankData.map(d => (maxRank - d.change_rank + 1) / maxRank * 100);

            chartRadar = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['股息率', '股价', '涨跌幅'],
                    datasets: labels.map((name, idx) => ({
                        label: name,
                        data: [dividendScores[idx], priceScores[idx], changeScores[idx]],
                        backgroundColor: [
                            'rgba(45, 111, 74, 0.15)',
                            'rgba(42, 95, 138, 0.15)',
                            'rgba(180, 130, 60, 0.15)',
                            'rgba(90, 150, 120, 0.15)',
                            'rgba(130, 100, 160, 0.15)'
                        ][idx % 5],
                        borderColor: ['#2d6f4a', '#2a5f8a', '#b4823c', '#5a9678', '#8264a0'][idx % 5],
                        borderWidth: 2,
                        pointRadius: 3,
                    }))
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { boxWidth: 10, font: { size: 10, weight: '500' }, color: '#294a70', padding: 8 }, position: 'bottom' }
                    },
                    scales: {
                        r: {
                            beginAtZero: true, max: 100,
                            ticks: { display: false },
                            grid: { color: 'rgba(0,0,0,0.06)' },
                            angleLines: { color: 'rgba(0,0,0,0.06)' },
                            pointLabels: { font: { size: 10, weight: '600' }, color: '#1a2f4a' }
                        }
                    }
                }
            });
        }

        // ---------- 趋势图（小） ----------
        function updateTrendChart(historyData) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (chartTrend) { chartTrend.destroy(); chartTrend = null; }

            if (!historyData || historyData.length === 0) return;

            // 显示股息率趋势
            const datasets = historyData.map((bank, idx) => {
                const colors = ['#2d6f4a', '#3a7d5a', '#478d68', '#569a78', '#68a888'];
                return {
                    label: bank.name,
                    data: bank.dividends,
                    borderColor: colors[idx % colors.length],
                    borderWidth: 1.5,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: false,
                    tension: 0.3,
                };
            });

            chartTrend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historyData[0]?.dates || [],
                    datasets: datasets
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { boxWidth: 10, font: { size: 9, weight: '500' }, color: '#294a70', padding: 6 }, position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.y.toFixed(2) + '%';
                                }
                            }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.03)' }, ticks: { callback: (v) => v + '%', font: { size: 9 } }, title: { display: true, text: '股息率 %', color: '#316745', font: { size: 9, weight: '500' } } },
                        x: { grid: { display: false }, ticks: { font: { size: 8 }, maxTicksLimit: 8 } }
                    }
                }
            });
        }

        // ---------- 从后端获取数据 ----------
        async function fetchAllData() {
            try {
                // 并行请求所有接口
                const [dividendRes, historyRes, rankRes] = await Promise.all([
                    fetch(API_DIVIDEND),
                    fetch(API_HISTORY).catch(() => null),
                    fetch(API_RANK).catch(() => null)
                ]);

                if (!dividendRes.ok) throw new Error(`HTTP ${dividendRes.status}`);

                const dividendResult = await dividendRes.json();

                if (dividendResult.status === 'success' && dividendResult.data && dividendResult.data.length > 0) {
                    currentData = dividendResult.data;
                    renderCards(currentData);
                    renderTable(currentData);
                    updateSourceStatus(currentData);
                    updateMainChart(currentData, currentView);

                    // 更新时间
                    const ts = dividendResult.timestamp || new Date().toLocaleString('zh-CN');
                    updateTimeDisplay.textContent = `更新: ${ts}`;
                    liveStatus.textContent = '✅ 数据已加载';

                    // 处理历史数据
                    if (historyRes) {
                        const historyResult = await historyRes.json();
                        if (historyResult.status === 'success' && historyResult.data) {
                            currentHistory = historyResult.data;
                            if (currentView === 'trend') updateMainChart(currentData, 'trend');
                            updateTrendChart(currentHistory);
                        }
                    }

                    // 处理排名数据
                    if (rankRes) {
                        const rankResult = await rankRes.json();
                        if (rankResult.status === 'success' && rankResult.data) {
                            currentRank = rankResult.data;
                            updateRadarChart(currentRank);
                        }
                    }

                    return true;
                } else {
                    throw new Error(dividendResult.message || '数据格式异常');
                }
            } catch (error) {
                console.error('获取数据失败:', error);
                updateTimeDisplay.textContent = `⚠️ 连接失败`;
                liveStatus.textContent = '❌ 连接失败';

                cardsContainer.innerHTML =
                    `<div class="loading-shimmer" style="color:#b33c3c;">
                        <i class="fas fa-exclamation-triangle fa-2x"></i>
                        <p style="margin-top:12px;">无法连接到后端服务<br>
                        <span style="font-size:0.8rem; color:#5f7d9e;">请确认 python app.py 已运行在 ${API_BASE}</span></p>
                    </div>`;
                tableBody.innerHTML =
                    `<tr><td colspan="7" style="text-align:center; color:#b33c3c; padding:30px;">❌ 数据加载失败，请检查后端</td></tr>`;
                return false;
            }
        }

        // ---------- 图表标签切换 ----------
        function setupChartTabs() {
            document.querySelectorAll('.chart-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentView = this.dataset.view;
                    if (currentData.length > 0) {
                        updateMainChart(currentData, currentView);
                    }
                });
            });
        }

        // ---------- 初始化 + 自动刷新 ----------
        async function init() {
            setupChartTabs();
            await fetchAllData();

            // 每30秒自动刷新
            setInterval(async () => {
                await fetchAllData();
            }, 30000);

            // 手动刷新
            refreshBtn.addEventListener('click', async function(e) {
                const icon = this.querySelector('i');
                icon.style.transition = 'transform 0.5s ease';
                icon.style.transform = 'rotate(360deg)';
                await fetchAllData();
                setTimeout(() => { icon.style.transform = 'rotate(0deg)'; }, 500);
            });
        }

        // DOM 加载完成后启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
