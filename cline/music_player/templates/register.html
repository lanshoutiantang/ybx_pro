{% extends "base.html" %}
{% block title %}注册 - 在线音乐管理系统{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <h3 class="mt-3">创建账号</h3>
                    <p style="color: var(--text-secondary);">加入音乐大家庭</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" name="password" class="form-control" placeholder="至少6位密码" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);">
                                <i class="fas fa-check-circle"></i>
                            </span>
                            <input type="password" name="confirm_password" class="form-control" placeholder="再次输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3">
                        <i class="fas fa-user-plus me-2"></i>注册
                    </button>
                </form>
                <div class="text-center mt-3">
                    <span style="color: var(--text-secondary);">已有账号？</span>
                    <a href="{{ url_for('login') }}" class="text-decoration-none">立即登录</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
